name: Publish release build
permissions:
  contents: write

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'pinterest/ktlint'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: 'master'

      - uses: ./.github/actions/setup-gradle-build

      - name: Build executable and publish to Maven
        run: ./gradlew clean ktlintCliFiles publishMavenPublicationToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PORTAL_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGPASSWORD }}

      - name: Validate changelog.md
        id: validate_changelog
        if: ${{ success() }}
        run: |
          FIRST_HEADING2=$(grep "^## " CHANGELOG.md | head -n 1)
          echo "First heading2 found: $FIRST_HEADING2"
          if [[ ! "$FIRST_HEADING2" =~ ^##[[:space:]]\[[0-9]+\.[0-9]+\.[0-9]+\][[:space:]]-[[:space:]][0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "First heading at level 2 should match '## [X.Y.Z] - [YYYY-MM-DD]'"
            exit 1
          fi

      - name: Extract release notes
        id: release_notes
        if: ${{ success() }}
        uses: ffurrer2/extract-release-notes@v3

      - name: Get version
        id: get_version
        if: ${{ success() }}
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Create zip for dependency manager(s)
        if: ${{ success() }}
        run: |
          cd ktlint-cli/build/run
          mkdir -p ktlint-${{ env.version }}/bin
          cp ktlint ktlint-${{ env.version }}/bin
          zip -rm ktlint-${{ env.version }}.zip ktlint-${{ env.version }}

      - name: Create release
        id: github_release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body: ${{ steps.release_notes.outputs.release_notes }}
          files: |
            ktlint-cli/build/run/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Homebrew Formula
        if: ${{ success() }}
        uses: mislav/bump-homebrew-formula-action@v2
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        with:
          formula-name: ktlint
          formula-path: Formula/k/ktlint.rb
          download-url: https://github.com/pinterest/ktlint/releases/download/${{ env.version }}/ktlint-${{ env.version }}.zip

      - name: Update Release documentation
        if: ${{ success() }}
        run: |
          git config user.email "ktlint@github.com"
          git config user.name "Ktlint Release Workflow" |
          ./.announce -y
        env:
          VERSION: ${{ env.version }}

  build-native-image:
    name: "Build GraalVM native-image (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    needs: publish
    if: github.repository == 'pinterest/ktlint'
    strategy:
      matrix:
        # ubuntu-22.04 is used instead of ubuntu-latest to produce a binary compatible with a wider range
        # of Linux distributions (glibc version constraint). See https://github.com/google/google-java-format/issues/1072.
        os: [ubuntu-22.04, macos-latest, windows-latest]
    env:
      SUFFIX: ${{ fromJson('{"ubuntu-22.04":"linux-x86-64","macos-latest":"darwin-arm64","windows-latest":"windows-x86-64"}')[matrix.os] }}
      EXTENSION: ${{ matrix.os == 'windows-latest' && '.exe' || '' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: 'master'

      - name: "Set up GraalVM"
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - name: Get version
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
        shell: bash

      - name: Build shadow JAR
        run: ./gradlew :ktlint-cli:shadowJar
        env:
          # Signing is not needed for the shadow JAR — skip it to avoid missing-key failures
          ORG_GRADLE_PROJECT_signingInMemoryKey: ""

      - name: Find shadow JAR (Unix)
        if: matrix.os != 'windows-latest'
        run: echo "SHADOW_JAR=$(ls ktlint-cli/build/libs/ktlint-cli-*-all.jar)" >> $GITHUB_ENV
        shell: bash

      - name: Find shadow JAR (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $jar = Get-ChildItem -Path "ktlint-cli/build/libs" -Filter "ktlint-cli-*-all.jar" | Select-Object -First 1
          echo "SHADOW_JAR=$($jar.FullName)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build native image
        run: >-
          native-image
          --no-fallback
          -H:+ReportExceptionStackTraces
          -march=compatibility
          -jar "${{ env.SHADOW_JAR }}"
          -o "ktlint_${{ env.SUFFIX }}"

      - name: Upload native binary to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" "ktlint_${{ env.SUFFIX }}${{ env.EXTENSION }}"
        shell: bash
